server {
  listen 80;
  listen [::]:80;
  server_name mousehunt.tuanhm.me;

  # Redirect all HTTP to HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name mousehunt.tuanhm.me;

  # SSL certs (replace with your real paths or use certbot)
  ssl_certificate     /etc/letsencrypt/live/mousehunt.tuanhm.me/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mousehunt.tuanhm.me/privkey.pem;

  # App static + WebSocket proxy
  location / {
    proxy_pass http://127.0.0.1:3000;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

